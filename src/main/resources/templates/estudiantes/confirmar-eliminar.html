<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Confirmar Eliminación</title></head>
<body>
<h1>¿Eliminar Estudiante?</h1>
<p th:text="'¿Desea eliminar a ' + ${estudiante.nombre} + ' ' + ${estudiante.apellido} + '?'"></p>
<form th:action="@{/templates/estudiantes/cursos/eliminar/{id}(id=${estudiante.id})}" method="post">
    <button type="submit">Sí, eliminar</button>
    <a th:href="@{/templates/estudiantes/cursos}">Cancelar</a>
</form>
</body>
</html>
